<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One-Time Admin Setup</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }
    form {
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    button {
      padding: 10px 20px;
      border: none;
      background: #007bff;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .message {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<form id="adminSetupForm">
  <h2>One-Time Admin Setup</h2>
  <input type="email" id="email" placeholder="Admin Email" required />
  <input type="password" id="password" placeholder="Admin Password" required />
  <button type="submit">Create Admin</button>
  <div class="message" id="message"></div>
</form>

<script>
  const form = document.getElementById("adminSetupForm");
  const messageDiv = document.getElementById("message");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      const res = await fetch("http://localhost:5000/api/admin/setup", {
        method: "POST", // make sure your route accepts POST
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });

      const data = await res.json();

      if (res.ok) {
        messageDiv.style.color = "green";
        messageDiv.textContent = data.message + " (" + data.admin.email + ")";
      } else {
        messageDiv.style.color = "red";
        messageDiv.textContent = data.message;
      }
    } catch (err) {
      messageDiv.style.color = "red";
      messageDiv.textContent = "Server error";
    }
  });
</script>

</body>
</html>
